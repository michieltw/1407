<!-- VIEW: MIJN PROFIEL -->
<style>
  .profiel-card { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.3); margin-bottom: 30px; }
  .profiel-header { display: flex; gap: 30px; align-items: flex-end; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
  .profiel-avatar-container { position: relative; }
  .profiel-avatar { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--surface); box-shadow: 0 10px 25px rgba(0,0,0,0.5); object-fit: cover; background: var(--bg); }
  .profiel-avatar-edit { position: absolute; bottom: 0; right: 0; background: var(--accent); color: #0a0a0a; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--surface); transition: transform 0.2s; }
  .profiel-avatar-edit:hover { transform: scale(1.1); }
  .profiel-info h2 { color: white; font-size: 2.5rem; font-weight: 900; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
  .profiel-info p { color: var(--accent); font-weight: 800; font-size: 1.1rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .form-section-title { color: white; font-size: 1.1rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
  .input-group label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .profiel-input { width: 100%; background-color: var(--bg) !important; color: white !important; border: 1px solid var(--border) !important; border-radius: 6px !important; padding: 12px !important; font-size: 0.95rem !important; transition: border-color 0.2s ease !important; box-sizing: border-box; }
  .profiel-input:focus { border-color: var(--accent) !important; outline: none !important; }
  .profiel-textarea { width: 100%; background-color: var(--bg) !important; color: white !important; border: 1px solid var(--border) !important; border-radius: 6px !important; padding: 12px !important; font-size: 0.95rem !important; min-height: 100px; resize: vertical; box-sizing: border-box; }

  .btn-massive { width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s, box-shadow 0.2s; background: var(--accent); color: #0a0a0a; box-shadow: 0 4px 15px rgba(255, 159, 0, 0.3); margin-top: 20px; }
  .btn-massive:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 159, 0, 0.5); }
  .btn-massive:active { transform: scale(0.98); }
</style>

<div class="profiel-card">
  <div class="profiel-header">
    <div class="profiel-avatar-container">
      <img src="https://ui-avatars.com/api/?name=Player&background=1f1f1f&color=FF9F00" id="mijnProfielFoto" class="profiel-avatar">
    </div>
    <div class="profiel-info">
      <h2 id="mijnProfielNaam">Laden...</h2>
      <p id="mijnProfielTeam">Team onbekend</p>
    </div>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">fitness_center</span> Fysiek & Identiteit</div>
  <div class="grid-3">
    <div class="input-group"><label>Lengte (cm)</label><input type="number" class="profiel-input" id="mpLengte"></div>
    <div class="input-group"><label>Gewicht (kg)</label><input type="number" class="profiel-input" id="mpGewicht"></div>
    <div class="input-group"><label>Rugnummer</label><input type="number" class="profiel-input" id="mpNummer"></div>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">sports_hockey</span> Stick Specificaties</div>
  <div class="grid-2">
    <div class="input-group"><label>Merk</label><input type="text" class="profiel-input" id="mpStickMerk"></div>
    <div class="input-group"><label>Model</label><input type="text" class="profiel-input" id="mpStickModel"></div>
    <div class="input-group"><label>Blad (Curve)</label><input type="text" class="profiel-input" id="mpStickBlad"></div>
    <div class="input-group"><label>Flex</label><input type="number" class="profiel-input" id="mpStickFlex"></div>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">person</span> Over Mij / Bio</div>
  <div class="input-group">
    <label>Een kort stukje tekst over jezelf, je speelstijl of je ervaring.</label>
    <textarea class="profiel-textarea" id="mpBio" placeholder="Ik ben een snelle winger met een goed schot..."></textarea>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">image</span> Profielfoto URL</div>
  <div class="input-group">
    <input type="text" class="profiel-input" id="mpFotoUrl" placeholder="https://link-naar-je-foto.jpg">
  </div>

  <button class="btn-massive" onclick="slaMijnProfielOp()" id="btnOpslaanMijnProfiel">
    <span class="material-symbols-outlined">save</span> Wijzigingen Opslaan
  </button>

  <div id="mpMelding" style="margin-top: 20px; font-weight: 900; text-align: center; font-size: 1.1rem; padding: 10px; border-radius: 8px;"></div>
</div>
