
<!-- VIEW: REGISTREREN (Guest Mode) -->
<style>
  .reg-card { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.3); max-width: 800px; margin: 0 auto 30px auto; }
  .reg-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
  .reg-header h2 { color: white; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 0; }
  .reg-header p { color: var(--accent); font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .form-section-title { color: white; font-size: 1.1rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
  .input-group label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .btn-massive { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s, box-shadow 0.2s; background: var(--accent); color: #0a0a0a; box-shadow: 0 6px 20px rgba(255, 159, 0, 0.4); margin-top: 30px; }
  .btn-massive:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 159, 0, 0.6); }
  .btn-massive:active { transform: scale(0.98); }
</style>

<div class="reg-card">
  <div class="reg-header">
    <h2>Join the League</h2>
    <p>Maak je officiële spelerprofiel aan</p>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">account_circle</span> Basis Gegevens</div>
  <div class="grid-2">
    <div class="input-group"><label>Volledige Naam *</label><input type="text" class="reg-input" id="regNaam" placeholder="Bijv. Connor McDavid"></div>
    <div class="input-group"><label>E-mailadres *</label><input type="email" class="reg-input" id="regEmail" placeholder="connor@nhl.com"></div>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">fitness_center</span> Fysiek & Niveau</div>
  <div class="grid-3">
    <div class="input-group"><label>Geboortedatum</label><input type="date" class="reg-input" id="regGebDatum"></div>
    <div class="input-group"><label>Lengte (cm)</label><input type="number" class="reg-input" id="regLengte" placeholder="185"></div>
    <div class="input-group"><label>Gewicht (kg)</label><input type="number" class="reg-input" id="regGewicht" placeholder="85"></div>
    <div class="input-group"><label>Niveau</label>
      <select class="reg-input" id="regNiveau"><option value="Recreatief">Recreatief</option><option value="Amateur">Amateur</option><option value="Pro">Pro / Elite</option></select>
    </div>
    <div class="input-group"><label>Voorkeursnummer</label><input type="number" class="reg-input" id="regNummer" placeholder="97"></div>
    <div class="input-group"><label>Schiet / Vangt</label>
      <select class="reg-input" id="regHand"><option value="Links">Links (L)</option><option value="Rechts">Rechts (R)</option></select>
    </div>
  </div>

  <div class="form-section-title"><span class="material-symbols-outlined" style="color:var(--accent);">sports_hockey</span> Stick Specificaties</div>
  <div class="grid-2">
    <div class="input-group"><label>Merk</label><input type="text" class="reg-input" id="regStickMerk" placeholder="Bauer, CCM, Warrior..."></div>
    <div class="input-group"><label>Model</label><input type="text" class="reg-input" id="regStickModel" placeholder="Nexus Tracer, Ribcor Trigger..."></div>
    <div class="input-group"><label>Blad (Curve)</label><input type="text" class="reg-input" id="regStickBlad" placeholder="P92, P28, P29..."></div>
    <div class="input-group"><label>Flex</label><input type="number" class="reg-input" id="regStickFlex" placeholder="77, 85, 95..."></div>
  </div>

  <button class="btn-massive" onclick="slaRegistratieOp()" id="btnOpslaanReg">
    <span class="material-symbols-outlined">how_to_reg</span> Registratie Voltooien
  </button>

  <div id="regMelding" style="margin-top: 20px; font-weight: 900; text-align: center; font-size: 1.1rem; padding: 10px; border-radius: 8px;"></div>
</div>
